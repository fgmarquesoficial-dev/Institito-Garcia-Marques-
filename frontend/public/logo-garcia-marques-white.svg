<svg width="500" height="120" viewBox="0 0 500 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glow effect definition -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Nested Triangles Logo with Glow -->
  <g id="triangles-logo">
    <!-- Outer circle with glow -->
    <circle cx="60" cy="60" r="45" fill="#0a2342" stroke="#4A9EFF" stroke-width="2" filter="url(#glow)"/>
    
    <!-- Nested triangles (larger spacing, centered) -->
    <g stroke="#ffffff" stroke-width="2" fill="none" stroke-linejoin="miter">
      <polygon points="60,20 30,90 90,90"/>
      <polygon points="60,28 35,82 85,82"/>
      <polygon points="60,36 40,74 80,74"/>
      <polygon points="60,44 45,66 75,66"/>
      <polygon points="60,52 50,58 70,58"/>
    </g>
  </g>
  
  <!-- Text -->
  <g id="logo-text">
    <text x="130" y="45" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#1a1a1a" letter-spacing="2">
      INSTITUTO
    </text>
    <text x="130" y="80" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#1a1a1a" letter-spacing="1">
      GARCIA MARQUES
    </text>
  </g>
</svg>